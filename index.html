<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Buscar Jugador Free Fire</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
      padding: 50px;
    }
    input {
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: none;
      width: 200px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      background: orange;
      cursor: pointer;
    }
    #resultado {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <h1>Buscar jugador Free Fire 🔥</h1>

  <input type="text" id="uid" placeholder="Ingresa ID">
  <button onclick="buscarJugador()">Buscar</button>

  <div id="resultado"></div>

  <script>
    function buscarJugador() {
      let uid = document.getElementById("uid").value;
      let resultado = document.getElementById("resultado");

      resultado.innerHTML = "Buscando...";

      fetch(`https://freefire-api-six.vercel.app/get_player_personal_show?server=us&uid=${uid}`)
        .then(res => res.json())
        .then(data => {
          console.log(data);

          if (data && data.nickname) {
            resultado.innerHTML = `
              <p><b>Nombre:</b> ${data.nickname}</p>
              <p><b>Nivel:</b> ${data.level}</p>
              <p><b>ID:</b> ${uid}</p>
            `;
          } else {
            resultado.innerHTML = "❌ No se encontró el jugador";
          }
        })
        .catch(err => {
          resultado.innerHTML = "⚠️ Error en la API";
        });
    }
  </script>

</body>
</html>
