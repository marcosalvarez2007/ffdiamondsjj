<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Buscar Jugador Free Fire</title>
<style>
    body {
        font-family: Arial;
        background: #0f172a;
        color: white;
        text-align: center;
        padding: 30px;
    }
    input {
        padding: 10px;
        width: 200px;
        border-radius: 10px;
        border: none;
    }
    button {
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: #06b6d4;
        color: black;
        font-weight: bold;
        cursor: pointer;
    }
    .card {
        margin-top: 20px;
        padding: 20px;
        background: #1e293b;
        border-radius: 15px;
        display: inline-block;
    }
</style>
</head>
<body>

<h1>🔥 Buscar jugador Free Fire</h1>

<input type="text" id="uid" placeholder="Ingresa UID">
<button onclick="buscar()">Buscar</button>

<div id="resultado"></div>

<script>
async function buscar() {
    let uid = document.getElementById("uid").value;
    let resultado = document.getElementById("resultado");

    resultado.innerHTML = "Buscando...";

    try {
        let res = await fetch(`https://ffname.vercel.app/?uid=${uid}`);
        let data = await res.json();

        if (!data.success) {
            resultado.innerHTML = "❌ No se encontró jugador";
            return;
        }

        let squad = data.data.quadstats;
        let solo = data.data.solostats;

        resultado.innerHTML = `
            <div class="card">
                <h2>🎮 UID: ${data.metadata.uid}</h2>
                <p>🌍 Servidor: ${data.metadata.server}</p>
                <p>⚔️ Modo: ${data.metadata.matchmode}</p>

                <h3>🔥 Squad</h3>
                <p>Partidas: ${squad.gamesplayed}</p>
                <p>Kills: ${squad.kills}</p>
                <p>Wins: ${squad.wins}</p>

                <h3>👤 Solo</h3>
                <p>Partidas: ${solo.gamesplayed}</p>
                <p>Kills: ${solo.kills}</p>
            </div>
        `;
    } catch (error) {
        resultado.innerHTML = "⚠️ Error con la API";
    }
}
</script>

</body>
</html>
