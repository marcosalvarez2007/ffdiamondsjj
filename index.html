<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Buscar Jugador Free Fire</title>
</head>
<body style="background:#111;color:white;text-align:center;padding:50px;">

  <h1>Buscar jugador 🔥</h1>

  <input type="text" id="uid" placeholder="Ingresa ID">
  <button onclick="buscarJugador()">Buscar</button>

  <div id="resultado"></div>

  <script>
    function buscarJugador() {
      let uid = document.getElementById("uid").value;
      let resultado = document.getElementById("resultado");

      resultado.innerHTML = "Buscando...";

      fetch(`https://freefire-api-six.vercel.app/get_player_personal_show?server=sac&uid=${uid}`)
        .then(res => res.json())
        .then(data => {
          console.log(data);

          // 🔥 FIX REAL
          if (data && data.data) {
            let jugador = data.data;

            resultado.innerHTML = `
              <p><b>Nombre:</b> ${jugador.nickname}</p>
              <p><b>Nivel:</b> ${jugador.level}</p>
              <p><b>ID:</b> ${uid}</p>
            `;
          } else {
            resultado.innerHTML = "❌ No se encontró el jugador";
          }
        })
        .catch(err => {
          resultado.innerHTML = "⚠️ Error en la API";
        });
    }
  </script>

</body>
</html>
