<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Buscar Jugador Free Fire</title>
</head>
<body style="background:#111;color:white;text-align:center;padding:50px;font-family:Arial;">

<h1>Buscar jugador 🔥</h1>

<input type="text" id="uid" placeholder="Ingresa tu ID">
<button onclick="buscar()">Buscar</button>

<div id="resultado" style="margin-top:20px;"></div>

<script>
async function buscar() {
  let uid = document.getElementById("uid").value;
  let res = document.getElementById("resultado");

  res.innerHTML = "Buscando...";

  try {
    let r = await fetch(`https://keyboards-plastics-exports-porcelain.trycloudflare.com/api/player?${uid}`);
    let data = await r.json();

    if (data.status === "ok") {
      res.innerHTML = `
        <p><b>Nombre:</b> ${data.nickname}</p>
        <p><b>Nivel:</b> ${data.level}</p>
        <p><b>Región:</b> ${data.region}</p>
        <button onclick="alert('Próximamente recargas')">💎 Recargar</button>
      `;
    } else {
      res.innerHTML = "❌ Jugador no encontrado";
    }

  } catch (e) {
    res.innerHTML = "⚠️ Error conectando con la API";
  }
}
</script>

</body>
</html>
